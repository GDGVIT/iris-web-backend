[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "B904",   # raise-without-from-inside-except (existing style)
    "E501",   # line too long — formatter handles length, not string literals
    "SIM117", # nested with statements (readability preference)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.basedpyright]
pythonVersion = "3.10"
venvPath = "."
venv = "env"
typeCheckingMode = "standard"
reportMissingImports = true
reportUnusedImport = true
reportUnusedVariable = true

[tool.pytest.ini_options]
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
