services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build: .
    restart: unless-stopped
    ports:
      - "9020:8080"
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=local-dev-secret-key
      - REDIS_URL=redis://redis:6379/0
      - PORT=8080
    depends_on:
      - redis

  worker:
    build: .
    restart: unless-stopped
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=local-dev-secret-key
      - REDIS_URL=redis://redis:6379/0
      - SERVICE_TYPE=worker
    depends_on:
      - redis
